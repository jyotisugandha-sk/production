<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Bus Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
tailwind.config = { darkMode: "class" }
</script>

<style>

/* ===== PREMIUM 3 LAYER TECH BACKGROUND ===== */

/* LAYER 1 : ANIMATED GRADIENT */

body::before{
content:"";
position:fixed;
inset:0;
z-index:-3;
background:linear-gradient(130deg,#e0f2fe,#bae6fd,#7dd3fc,#38bdf8,#0ea5e9);
background-size:400% 400%;
animation:gradientMove 18s ease infinite;
}

.dark body::before{
background:linear-gradient(130deg,#020617,#0f172a,#1e293b,#0f172a,#020617);
background-size:400% 400%;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* LAYER 2 : FLOATING TECH ORBS */

body::after{
content:"";
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at 20% 30%, rgba(56,189,248,0.35), transparent 40%),
radial-gradient(circle at 80% 20%, rgba(14,165,233,0.35), transparent 40%),
radial-gradient(circle at 70% 80%, rgba(2,132,199,0.35), transparent 40%),
radial-gradient(circle at 30% 70%, rgba(125,211,252,0.35), transparent 40%);
filter:blur(60px);
animation:orbMove 25s linear infinite;
}

.dark body::after{
background:
radial-gradient(circle at 20% 30%, rgba(56,189,248,0.25), transparent 40%),
radial-gradient(circle at 80% 20%, rgba(14,165,233,0.25), transparent 40%),
radial-gradient(circle at 70% 80%, rgba(2,132,199,0.25), transparent 40%),
radial-gradient(circle at 30% 70%, rgba(125,211,252,0.25), transparent 40%);
}

@keyframes orbMove{
0%{transform:translateY(0px)}
50%{transform:translateY(-40px)}
100%{transform:translateY(0px)}
}

/* NETWORK BACKGROUND */

#network{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

/* GLASS CARD */

.glass{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(15px);
border-radius:14px;
padding:20px;
}

.dark .glass{
background:rgba(15,23,42,0.9);
}

/* TEXT VISIBILITY */

.dark body{
color:#f1f5f9;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:0;
width:260px;
height:100%;
z-index:1000;
transition:0.3s;
}

/* MENU */

.menu{
display:flex;
align-items:center;
gap:12px;
padding:10px;
border-radius:10px;
color:#334155;
}

.dark .menu{
color:#f8fafc;
}

.menu:hover{
background:linear-gradient(90deg,#0ea5e9,#2563eb);
color:white;
}

.menu.bus{
background:linear-gradient(90deg,#06b6d4,#2563eb);
color:white;
}

/* ROUTE BUS */

.route-container{
position:relative;
height:60px;
overflow:hidden;
}

.route-bus{
position:absolute;
font-size:30px;
left:0;
animation:movebus 8s linear infinite;
}

@keyframes movebus{
0%{left:0%}
100%{left:85%}
}

/* MAP */

#map{
height:350px;
width:100%;
border-radius:12px;
}

/* OVERLAY */

#overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
z-index:900;
display:none;
}

</style>
</head>

<body class="bg-sky-50 dark:bg-slate-900 transition">

<canvas id="network"></canvas>

<div id="overlay"></div>

<!-- NAVBAR -->

<header class="sticky top-0 bg-white/70 dark:bg-slate-900/80 backdrop-blur z-40">

<div class="flex justify-between px-6 py-3">

<div class="flex items-center gap-4">

<button id="menuBtn" class="text-2xl md:hidden">
<i class="bi bi-list"></i>
</button>

<h2 class="font-semibold dark:text-white">
Student Bus Dashboard
</h2>

</div>

<button id="darkBtn">
<i class="bi bi-moon-stars-fill text-xl"></i>
</button>

</div>

</header>

<!-- SIDEBAR -->

<aside id="sidebar"
class="sidebar bg-white dark:bg-slate-900 border-r dark:border-slate-700 p-6 flex flex-col transform -translate-x-full md:translate-x-0">

<div class="flex justify-between items-center mb-6">

<h1 class="font-bold text-lg dark:text-white">
Student Panel
</h1>

<button id="closeSidebar" class="md:hidden text-xl">
<i class="bi bi-x-lg"></i>
</button>

</div>

<ul class="space-y-3">

<li><a class="menu"><i class="bi bi-house"></i>Dashboard</a></li>
<li><a class="menu"><i class="bi bi-person"></i>Profile</a></li>
<li><a class="menu"><i class="bi bi-list-check"></i>Attendance</a></li>
<li><a class="menu"><i class="bi bi-cash"></i>Fees</a></li>

<li>
<a class="menu bus">
<i class="bi bi-bus-front"></i>Bus Module
</a>
</li>

<li><a class="menu"><i class="bi bi-gear"></i>Settings</a></li>

</ul>

<div class="mt-auto border-t pt-6 dark:border-slate-700">

<a class="menu hover:bg-red-500 hover:text-white">
<i class="bi bi-box-arrow-right"></i>
Logout
</a>

</div>

</aside>

<!-- MAIN -->

<main class="md:ml-[260px] p-6 space-y-6">

<div class="grid md:grid-cols-4 gap-6">

<div class="glass">
<p class="text-gray-500 dark:text-gray-300">Bus Number</p>
<p class="text-2xl font-bold">KA-27-4582</p>
</div>

<div class="glass">
<p class="text-gray-500 dark:text-gray-300">Students Riding</p>
<p class="text-2xl font-bold">34</p>
</div>

<div class="glass">
<p class="text-gray-500 dark:text-gray-300">Capacity</p>
<p class="text-2xl font-bold">40</p>
</div>

<div class="glass">
<p class="text-gray-500 dark:text-gray-300">Status</p>
<p class="text-green-500 font-bold">Running</p>
</div>

</div>

<div class="glass">

<h2 class="font-semibold mb-4">Bus Route</h2>

<div class="flex items-center justify-between">

<div class="font-semibold">🏠 Home</div>

<div class="route-container flex-1 mx-6">
<div class="route-bus">🚌</div>
</div>

<div class="font-semibold">🏫 School</div>

</div>

</div>

<div class="glass">

<h2 class="font-semibold mb-4">Live Bus Tracking</h2>
<div id="map"></div>

</div>

</main>

<script>

/* DARK MODE */

const darkBtn=document.getElementById("darkBtn")

darkBtn.onclick=()=>{
document.documentElement.classList.toggle("dark")
}

/* SIDEBAR */

const sidebar=document.getElementById("sidebar")
const overlay=document.getElementById("overlay")

menuBtn.onclick=()=>{
sidebar.classList.remove("-translate-x-full")
overlay.style.display="block"
}

closeSidebar.onclick=()=>{
sidebar.classList.add("-translate-x-full")
overlay.style.display="none"
}

overlay.onclick=()=>{
sidebar.classList.add("-translate-x-full")
overlay.style.display="none"
}

/* MAP */

document.addEventListener("DOMContentLoaded",function(){

var map=L.map('map').setView([12.9716,77.5946],13)

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map)

L.marker([12.9716,77.5946]).addTo(map)
.bindPopup("Bus Location")

})

/* NETWORK PARTICLE BACKGROUND */

const canvas=document.getElementById("network")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]
let count=80

class Particle{
constructor(){
this.x=Math.random()*canvas.width
this.y=Math.random()*canvas.height
this.vx=(Math.random()-0.5)*0.7
this.vy=(Math.random()-0.5)*0.7
this.size=2
}

move(){
this.x+=this.vx
this.y+=this.vy

if(this.x<0||this.x>canvas.width) this.vx*=-1
if(this.y<0||this.y>canvas.height) this.vy*=-1
}

draw(){

const dark=document.documentElement.classList.contains("dark")

ctx.fillStyle=dark
?"rgba(56,189,248,1)"
:"rgba(2,132,199,1)"

ctx.beginPath()
ctx.arc(this.x,this.y,this.size,0,Math.PI*2)
ctx.fill()

}
}

function init(){
particles=[]
for(let i=0;i<count;i++){
particles.push(new Particle())
}
}

init()

function connect(){

const dark=document.documentElement.classList.contains("dark")

for(let a=0;a<particles.length;a++){
for(let b=a;b<particles.length;b++){

let dx=particles[a].x-particles[b].x
let dy=particles[a].y-particles[b].y
let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){

ctx.strokeStyle=dark
?"rgba(56,189,248,0.25)"
:"rgba(2,132,199,0.25)"

ctx.lineWidth=1

ctx.beginPath()
ctx.moveTo(particles[a].x,particles[a].y)
ctx.lineTo(particles[b].x,particles[b].y)
ctx.stroke()

}
}
}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{
p.move()
p.draw()
})

connect()

requestAnimationFrame(animate)

}

animate()

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth
canvas.height=window.innerHeight
init()
})

</script>

</body>
</html>
